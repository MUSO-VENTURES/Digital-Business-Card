<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shane Musseau — MUSO VENTURES</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0a0a0a;
    --surface: #111111;
    --card: #161616;
    --border: #222222;
    --blue: #2B7CB8;
    --blue-light: #4DB8C8;
    --text: #f0f0f0;
    --muted: #888888;
    --white: #ffffff;
  }

  body {
    background: var(--black);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 420px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(43,124,184,0.12);
  }

  /* Header gradient bar */
  .card-header {
    background: linear-gradient(135deg, #1C3A5E 0%, #2B7CB8 55%, #4DB8C8 100%);
    padding: 32px 28px 28px;
    position: relative;
    overflow: hidden;
  }

  .card-header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
  }

  .card-header::after {
    content: '';
    position: absolute;
    bottom: -20px; left: 60px;
    width: 90px; height: 90px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }

  .logo-wordmark {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 0.25em;
    color: rgba(255,255,255,0.7);
    margin-bottom: 16px;
  }

  .mv-mark {
    width: 48px;
    height: 48px;
    margin-bottom: 14px;
  }

  .card-name {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 26px;
    color: var(--white);
    line-height: 1.1;
    letter-spacing: -0.02em;
  }

  .card-title {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 400;
    color: rgba(255,255,255,0.75);
    margin-top: 6px;
    line-height: 1.5;
  }

  /* Body */
  .card-body {
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .contact-row {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    color: var(--text);
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid transparent;
    transition: background 0.15s, border-color 0.15s;
  }

  .contact-row:hover {
    background: rgba(43,124,184,0.08);
    border-color: rgba(43,124,184,0.2);
  }

  .contact-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: rgba(43,124,184,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .contact-icon svg {
    width: 16px;
    height: 16px;
    fill: var(--blue-light);
  }

  .contact-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    line-height: 1;
    margin-bottom: 3px;
  }

  .contact-value {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 4px 0;
  }

  /* CTA buttons */
  .card-footer {
    padding: 0 28px 28px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .btn {
    display: block;
    width: 100%;
    padding: 14px;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.06em;
    text-align: center;
    text-decoration: none;
    cursor: pointer;
    border: none;
    transition: opacity 0.15s, transform 0.1s;
  }

  .btn:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }

  .btn-primary {
    background: linear-gradient(135deg, #2B7CB8, #4DB8C8);
    color: var(--white);
  }

  .btn-secondary {
    background: transparent;
    color: var(--blue-light);
    border: 1px solid rgba(77,184,200,0.35);
  }

  .btn-ghost {
    background: rgba(255,255,255,0.04);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .studio-badge {
    text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.18);
    padding: 16px 0 4px;
  }
</style>
</head>
<body>

<div class="card">

    <a class="contact-row" href="https://linkedin.com/in/shanemusseau" target="_blank">
      <div class="contact-icon">
        <svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>

      <div>
        <div class="contact-label">LinkedIn</div>
        <div class="contact-value">linkedin.com/in/shanemusseau</div>

    <div class="divider"></div>

  </div>

  <div class="card-footer">
    <button class="btn btn-primary" onclick="downloadVCard()">Save Contact (.vcf)</button>
    <a class="btn btn-secondary" href="https://shane-musseau-portfolio.figma.site" target="_blank">View Portfolio</a>
    <a class="btn btn-ghost" href="mailto:shane@muso-ventures.com">Get in Touch</a>
  </div>

  <div class="studio-badge">MUSO VENTURES LLC — LIVERMORE, CA</div>

</div>

<script>
function downloadVCard() {
  const vcard = `BEGIN:VCARD
VERSION:3.0
FN:Shane Musseau
N:Musseau;Shane;;;
ORG:MUSO VENTURES LLC
TITLE:CEO - MUSO VENTURES / Motion Designer & Creative Technologist
TEL;TYPE=CELL:+17072456495
EMAIL;TYPE=WORK:shane@muso-ventures.com
URL:https://shane-musseau-portfolio.figma.site
URL:https://linkedin.com/in/shanemusseau
ADR;TYPE=WORK:;;Livermore;CA;;USA
END:VCARD`;
  const blob = new Blob([vcard], { type: 'text/vcard' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'Shane_Musseau_MUSO_VENTURES.vcf';
  a.click();
}
</script>

</body>
</html>
